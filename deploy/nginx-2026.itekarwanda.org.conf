# À copier sur le VPS : /etc/nginx/conf.d/2026.itekarwanda.org.conf
# Puis : nginx -t && systemctl reload nginx
# Puis (une fois le DNS propagé) : certbot --nginx -d 2026.itekarwanda.org
# (certbot réécrit ce fichier pour ajouter le bloc HTTPS + redirection automatiquement)

server {
    listen 80;
    server_name 2026.itekarwanda.org;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
